<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; form-action 'self'; base-uri 'self'; object-src 'none'; worker-src 'self'">
<meta name="referrer" content="no-referrer">
<meta name="description" content="Field math for the trades. Calculators and reference tools for electricians, plumbers, HVAC, restoration, carpentry, and fire-ground engineering.">
<meta name="color-scheme" content="dark">
<title>Rough Logic</title>
<meta name="theme-color" content="#0a0a0a">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="manifest" href="site.webmanifest">
<script src="theme.js"></script>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="site-header" role="banner">
  <div class="header-inner">
    <a class="brand" href="#" aria-label="Rough Logic home">
      <span class="wordmark">roughlogic</span>
      <span class="tagline">tools for the trade.</span>
    </a>
    <div class="header-search" role="search">
      <label class="visually-hidden" for="search-input">Search tools</label>
      <input
        id="search-input"
        type="search"
        inputmode="search"
        autocomplete="off"
        placeholder="Search tools"
        class="search-input"
        list="tool-suggestions"
      >
      <datalist id="tool-suggestions"></datalist>
    </div>
    <button
      type="button"
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Switch to light mode"
      title="Switch to light mode"
      aria-pressed="false"
    >
      <svg class="theme-icon theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="m4.93 4.93 1.41 1.41"></path>
        <path d="m17.66 17.66 1.41 1.41"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="m6.34 17.66-1.41 1.41"></path>
        <path d="m19.07 4.93-1.41 1.41"></path>
      </svg>
      <svg class="theme-icon theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <button
      type="button"
      id="big-buttons-toggle"
      class="theme-toggle big-buttons-toggle"
      aria-label="Turn on big buttons mode"
      title="Big buttons: off"
      aria-pressed="false"
    >Big</button>
  </div>
</header>

<main id="main" tabindex="-1">

  <section id="recents-region" class="tile-grid-region" aria-label="Recent tools" hidden>
    <div class="pinned-header">
      <h2 class="pinned-title">Recents</h2>
      <button type="button" id="clear-recents" class="filter-btn">Clear recents</button>
    </div>
    <ul id="recents-grid" class="tile-grid" role="list"></ul>
  </section>

  <section id="pinned-region" class="tile-grid-region" aria-label="Pinned tools" hidden>
    <div class="pinned-header">
      <h2 class="pinned-title">Pinned</h2>
      <button type="button" id="clear-pins" class="filter-btn">Clear pins</button>
    </div>
    <ul id="pinned-grid" class="tile-grid" role="list"></ul>
  </section>

  <section id="tools" class="tile-grid-region" aria-label="Tools">
    <h1 class="visually-hidden">Tools</h1>
    <div id="tools-sections" class="tools-sections"></div>
    <p id="empty-state" class="empty-state" hidden>No tools match that search.</p>
    <noscript>
      <p class="noscript-notice">roughlogic requires JavaScript to render the calculators. Every calculation runs locally in your browser. No data leaves your device.</p>
    </noscript>
  </section>

  <section id="view-region" class="view-region" aria-live="polite" hidden>
  </section>

</main>

<footer class="site-footer" role="contentinfo">
  <div class="footer-badges">
    <a class="footer-badge" href="https://claygood.com" rel="noopener">
      <span>Made with </span>
      <span class="footer-badge-heart" aria-hidden="true">&#9829;</span>
      <span> by Clay Good</span>
    </a>
    <a class="footer-badge" href="https://github.com/clay-good/roughlogic.com" rel="noopener">
      <svg class="footer-badge-icon" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      <span>GitHub</span>
    </a>
  </div>
</footer>

<script type="module" src="app.js"></script>
</body>
</html>
