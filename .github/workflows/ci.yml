name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint and grep checks
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit
      - name: Verify data integrity
        run: npm run data:verify

  lighthouse:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli
      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Fast a11y-only signal: axe-core scan over every tile_id in TOOLS plus
  # the home view (spec-v10 §E.3, parameterized at test-import time from
  # app.js so a new tile is automatically covered). Surfaces WCAG
  # violations early in the PR cycle before the longer integration job.
  accessibility:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright and axe-core
        run: |
          npm install --no-save @playwright/test@latest @axe-core/playwright@latest
          npx playwright install --with-deps chromium
      - name: Run accessibility tests (axe-core only)
        run: npm run test:a11y

  # Full integration suite: per-tile axe-core loop + smoke + layout +
  # theme + viewer + print + CSV + perf (spec-v10 §E.1 / §E.2 / §E.3 /
  # §H.3). Catches regressions in the search auto-route, theme persistence,
  # mobile header layout, Group H reference views, the bundle round-trip,
  # and the static changelog viewer. Runs in parallel with `accessibility`.
  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright and axe-core
        run: |
          npm install --no-save @playwright/test@latest @axe-core/playwright@latest
          npx playwright install --with-deps chromium
      - name: Run integration tests (full suite)
        run: npm run test:e2e
